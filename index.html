<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="#">Fraud Detection System</a>
            <div class="d-flex">
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Predict Transaction</h5>
                    </div>
                    <div class="card-body">
                        <form id="predictionForm">
                            <div class="mb-3">
                                <label for="amount" class="form-label">Transaction Amount ($)</label>
                                <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="e.g. 1500.00" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Check for Fraud</button>
                        </form>
                    </div>
                </div>

                <div id="resultCard" class="card mt-4 d-none">
                    <div class="card-body text-center">
                        <h5 class="card-title">Prediction Result</h5>
                        <img id="predictionImage" src="" alt="Result" class="img-fluid mb-3" style="max-height: 150px; display: none;">
                        <h2 id="predictionText" class="fw-bold my-3"></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const amount = document.getElementById('amount').value;
            const resultCard = document.getElementById('resultCard');
            const predictionText = document.getElementById('predictionText');
            const predictionImage = document.getElementById('predictionImage');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Amount: amount })
                });

                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    resultCard.classList.remove('d-none');
                    predictionText.textContent = data.prediction;
                    predictionImage.style.display = 'inline-block';

                    if (data.prediction === 'Fraud') {
                        predictionText.className = 'fw-bold my-3 text-danger';
                        predictionImage.src = 'https://cdn-icons-png.flaticon.com/512/4126/4126188.png';
                    } else {
                        predictionText.className = 'fw-bold my-3 text-success';
                        predictionImage.src = 'https://cdn-icons-png.flaticon.com/512/2438/2438078.png';
                    }
                } else {
                    let errorMessage = 'An error occurred.';
                    if (data.error) {
                        // Handle both string and object errors from the API for robustness
                        if (typeof data.error === 'object') {
                            errorMessage = Object.keys(data.error)
                                .map(key => `${key}: ${Array.isArray(data.error[key]) ? data.error[key].join(', ') : data.error[key]}`)
                                .join('\n');
                        } else {
                            errorMessage = data.error;
                        }
                    }
                    alert(errorMessage);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to the server.');
            }
        });
    </script>
</body>
</html>
